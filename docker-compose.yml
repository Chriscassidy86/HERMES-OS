services:
  hermes-paper:
    build: .
    environment:
      HERMES_MODE: PAPER
      HERMES_DATABASE: /app/data/hermes.sqlite3
      HERMES_LOG_DIR: /app/logs
    volumes:
      - hermes-data:/app/data
      - hermes-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  hermes-data:
  hermes-logs:
