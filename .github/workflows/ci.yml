name: paper-mode-ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q agents backtests core data_providers database models paper_trading reports services
      - run: python scripts/check_format.py
      - run: git diff --check
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # GitLeaks builds event-specific revision ranges (base..head for pull
      # requests and before..after for pushes), so both endpoints must exist.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The action uses the read-only automatic token to inspect pull-request
      # metadata; it does not grant write access or weaken leak detection.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
